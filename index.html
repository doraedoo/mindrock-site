<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindrock | Digital Infrastructure</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">

<style>
* { caret-color: transparent !important; outline: none !important; }

body {
    background: #030610;
    font-family: 'Inter', sans-serif;
    color: #f8fafc;
    margin: 0;
    overflow-x: hidden;
}

/* Logo */
.mr-logo-img {
    height: 120px;
    animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

/* 卡片 */
.mr-glass {
    background: rgba(15,23,42,0.4);
    border: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
    cursor: pointer;
}
.mr-glass:hover {
    transform: translateY(-5px);
    border-color: #38bdf8;
}

/* modal */
#modal-overlay {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow-y:auto;
    background:rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    z-index:100;
    animation: fadeIn .3s;
}

.modal-content {
    max-height:75vh;
    overflow-y:auto;
    animation: zoom .3s;
}

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes zoom { from{transform:scale(.9)} to{transform:scale(1)} }

/* footer links */
.legal a {
    font-size:10px;
    color:#64748b;
    text-decoration:none;
    margin:0 10px;
}
.legal a:hover {
    color:#38bdf8;
}
</style>
</head>

<body class="flex flex-col items-center justify-between min-h-screen text-center p-6">

<header>
<img src="logo.png.png" class="mr-logo-img">
</header>

<main class="max-w-5xl w-full">

<h1 class="text-3xl md:text-5xl font-light mt-6">
Architecting the Future of Digital Flow
</h1>

<p class="mt-4 text-slate-400 text-sm">
Mindrock Smart Technology Limited
</p>

<div class="grid md:grid-cols-3 gap-6 mt-10">

<div class="mr-glass p-6 rounded-xl" onclick="openModal('onboarding')">
<h3>Onboarding & UI</h3>
<p class="text-sm text-slate-400">Compliant interaction layer</p>
</div>

<div class="mr-glass p-6 rounded-xl" onclick="openModal('engine')">
<h3>Technical Facilitation</h3>
<p class="text-sm text-slate-400">Secure instruction flow</p>
</div>

<div class="mr-glass p-6 rounded-xl" onclick="openModal('partner')">
<h3>Licensed Integration</h3>
<p class="text-sm text-slate-400">API connectivity</p>
</div>

</div>

</main>

<footer class="mt-10">

<div class="legal">
<a href="/terms.html">Terms</a>
<a href="/privacy-policy.html">Privacy</a>
<a href="/risk-disclosure.html">Risk</a>
</div>

<p class="text-xs text-slate-600 mt-4">
Mindrock Smart Technology Limited is a software service provider.
</p>

</footer>

<!-- modal -->
<div id="modal-overlay" onclick="closeModal()">
<div class="modal-content bg-[#0f172a] p-8 rounded-xl max-w-lg mx-auto mt-20" onclick="event.stopPropagation()">

<h2 id="modal-title" class="text-sky-400 text-xl mb-4"></h2>
<p id="modal-body" class="text-slate-300 text-sm"></p>

<button onclick="closeModal()" class="mt-6 text-sm text-slate-400">Close</button>

</div>
</div>

<script>
const details = {
onboarding:{
title:"Onboarding & UI",
body:"We provide user interaction infrastructure enabling compliant onboarding experiences."
},
engine:{
title:"Technical Facilitation",
body:"We act as a technical bridge and do not execute trades or custody funds."
},
partner:{
title:"Licensed Integration",
body:"All financial services are provided by licensed third-party partners."
}
};

function openModal(type){
document.getElementById("modal-title").innerText = details[type].title;
document.getElementById("modal-body").innerText = details[type].body;
document.getElementById("modal-overlay").style.display="block";
document.body.style.overflow="hidden";
}

function closeModal(){
document.getElementById("modal-overlay").style.display="none";
document.body.style.overflow="auto";
}
</script>

</body>
</html>
